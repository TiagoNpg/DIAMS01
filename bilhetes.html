<!doctype html>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<html>
   <head>
      <meta charset="UTF-8" />
      <title>Compra de Bilhetes</title>
      <link rel="stylesheet" href="./assets/style.css" />
   </head>
   <body>
      <header>
         <h1>Compra de Bilhetes</h1>
      </header>
      <main>
         <p>
            Não perca a oportunidade de assistir ao vivo aos melhores levantadores
            de peso do mundo competindo no Deadlift Championship!
         </p>
         <div class="ticket-item" data-ticket="standard">
            <span>Bilhete Standard (€25)</span>   
            <button class="btnSmaller" onclick="subtractTicket(this)"><i class="fa fa-minus"></i></button>
            <span class="ticket-count">0</span>
            <button class="btnSmaller" onclick="addTicket(this)"><i class="fa fa-plus"></i></button>
         </div>

         <div class="ticket-item" data-ticket="premium">
            <span>Bilhete Premium (€50)</span>   

            <button class="btnSmaller" onclick="subtractTicket(this)"><i class="fa fa-minus"></i></button>
            <span class="ticket-count">0</span>
            <button class="btnSmaller" onclick="addTicket(this)"><i class="fa fa-plus"></i></button>
         </div>
      </main>
      <script src="./main.js"></script>
   </body>
</html>
