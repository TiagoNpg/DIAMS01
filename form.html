<!doctype html>
<html>
   <head>
      <meta charset="UTF-8" />
      <title>Formulário de Inscrição</title>
      <link rel="stylesheet" href="./assets/css/style.css" />
      <link rel="stylesheet" href="./assets/css/form.css" />
   </head>
   <body>
      <header>
         <h1>Inscrição para de voluntários para o Deadlift Championship</h1>
         <nav>
            <a href="homePage.html">Homepage</a>
         </nav>
         <br />
      </header>
      <main>
         <form action="success.html" method="get">
            <div id="formValues">
               <div class="FormSection">
                  <div class="InputSectionTitle">Informações Gerais</div>
                  <div class="FormInput">
                     <input type="text" id="name" name="name" required />
                     <p>Nome:</p>
                  </div>
                  <div class="FormInput">
                     <input type="email" id="email" name="email" required />
                     <p>Email:</p>
                  </div>
                  <div class="FormInput">
                     <input type="tel" id="phone" name="phone" required />
                     <p>Telefone:</p>
                  </div>
               </div>
               <div class="FormSection">
                  <div class="InputSectionTitle">Horas Disponiveis:</div>
                  <div class="FormInput">
                     <p>8:00</p>
                     <input
                        type="checkbox"
                        id="hora1"
                        name="hora1"
                        value="8:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>9:00</p>
                     <input
                        type="checkbox"
                        id="hora2"
                        name="hora2"
                        value="9:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>10:00</p>
                     <input
                        type="checkbox"
                        id="hora3"
                        name="hora3"
                        value="10:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>11:00</p>
                     <input
                        type="checkbox"
                        id="hora4"
                        name="hora4"
                        value="11:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>12:00</p>
                     <input
                        type="checkbox"
                        id="hora5"
                        name="hora5"
                        value="12:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>13:00</p>
                     <input
                        type="checkbox"
                        id="hora6"
                        name="hora6"
                        value="13:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>14:00</p>
                     <input
                        type="checkbox"
                        id="hora7"
                        name="hora7"
                        value="14:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>15:00</p>
                     <input
                        type="checkbox"
                        id="hora8"
                        name="hora8"
                        value="15:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>16:00</p>
                     <input
                        type="checkbox"
                        id="hora9"
                        name="hora9"
                        value="16:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>17:00</p>
                     <input
                        type="checkbox"
                        id="hora10"
                        name="hora10"
                        value="17:00"
                     />
                  </div>
                  <div class="FormInput">
                     <p>18:00</p>
                     <input
                        type="checkbox"
                        id="hora11"
                        name="hora11"
                        value="18:00"
                     />
                  </div>
               </div>
               <div class="FormSection">
                  <div class="InputSectionTitle">Tarefas Disponiveis:</div>
                  <div class="FormInput">
                     <p>Limpeza</p>
                     <input
                        type="checkbox"
                        id="Limpeza"
                        name="Limpeza"
                        value="Limpeza"
                     />
                  </div>
                  <div class="FormInput">
                     <p>Montagens</p>
                     <input
                        type="checkbox"
                        id="Montagens"
                        name="Montagens"
                        value="Montagens"
                     />
                  </div>
                  <div class="FormInput">
                     <p>Arrumações</p>
                     <input
                        type="checkbox"
                        id="Arrumações"
                        name="Arrumações"
                        value="Arrumações"
                     />
                  </div>
                  <div class="FormInput">
                     <p>Organização</p>
                     <input
                        type="checkbox"
                        id="Organização"
                        name="Organização"
                        value="Organização"
                     />
                  </div>
               </div>
               <div class="FormSection">
                  <div class="InputSectionTitle">Comentário:</div>
                  <div class="FormInput">
                     <input type="text" id="Comment" name="Comment" value="" />
                  </div>
               </div>
               <div class="FormSection">
                  <input
                     class="submitButton"
                     type="submit"
                     value="Inscrever-se"
                     id="Submit"
                  />
               </div>
            </div>
         </form>
      </main>
      <script src="./assets/javascript/main.js"></script>
   </body>
</html>
