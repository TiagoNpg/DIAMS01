<!doctype html>
<html>
   <head>
      <meta charset="UTF-8" />
      <title>Formulário de Inscrição</title>
      <link rel="stylesheet" href="./assets/css/style.css" />
      <link rel="stylesheet" href="./assets/css/form.css" />
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
   </head>
   <body>
      <header>
         <h1>Formulário de inscrição</h1>
         <nav>
            <a href="homePage.html"><i class="fa fa-home"></i></a>
         </nav>
      </header>
      <main>
         <form action="success.html" method="get">
            <div id="formValues">
               <div class="FormSection">
                  <div class="InputSectionTitle">Informações Gerais</div>
                  <div class="FormInput">
                     <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Nome"
                        required
                     />
                  </div>
                  <div class="FormInput">
                     <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Email"
                        required
                     />
                  </div>
                  <div class="FormInput">
                     <input
                        type="tel"
                        placeholder="Telemóvel"
                        id="phone"
                        name="phone"
                        required
                     />
                  </div>
               </div>
               <!-- Horas Disponíveis -->
               <div class="FormSection">
                  <div class="InputSectionTitle">Horas Disponíveis:</div>
                  <div class="ToggleGroup" id="horasGroup">
                     <button type="button" class="ToggleBtn" data-value="8:00">
                        8:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="9:00">
                        9:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="10:00">
                        10:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="11:00">
                        11:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="12:00">
                        12:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="13:00">
                        13:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="14:00">
                        14:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="15:00">
                        15:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="16:00">
                        16:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="17:00">
                        17:00
                     </button>
                     <button type="button" class="ToggleBtn" data-value="18:00">
                        18:00
                     </button>
                  </div>
                  <!-- Hidden input to carry the value on form submit -->
                  <input type="hidden" name="horas" id="horasInput" />
               </div>
               <div class="FormSection">
                  <div class="InputSectionTitle">Tarefas Disponíveis:</div>
                  <div class="ToggleGroup" id="tarefasGroup">
                     <button
                        type="button"
                        class="ToggleBtn"
                        data-value="Limpeza"
                     >
                        Limpeza
                     </button>
                     <button
                        type="button"
                        class="ToggleBtn"
                        data-value="Montagens"
                     >
                        Montagens
                     </button>
                     <button
                        type="button"
                        class="ToggleBtn"
                        data-value="Arrumações"
                     >
                        Arrumações
                     </button>
                     <button
                        type="button"
                        class="ToggleBtn"
                        data-value="Organização"
                     >
                        Organização
                     </button>
                  </div>
                  <input type="hidden" name="tarefas" id="tarefasInput" />
               </div>
               <div class="FormSection">
                  <div class="InputSectionTitle">Comentário:</div>
                  <div class="FormInput">
                     <textarea
                        type="text"
                        id="Comment"
                        name="Comment"
                        placeholder="Escreva aqui o seu comentário"
                     ></textarea>
                  </div>
               </div>
               <div class="FormSection">
                  <input
                     class="submitButton"
                     type="submit"
                     value="Inscrever-se"
                     id="Submit"
                  />
               </div>
            </div>
         </form>
      </main>
      <script src="./assets/javascript/main.js"></script>
   </body>
</html>
